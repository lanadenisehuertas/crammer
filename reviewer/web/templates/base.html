<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Crammer{% endblock %}</title>
  <style>
    :root { --bg:#0f1117; --card:#1a1d27; --fg:#e7e9ee; --muted:#9aa0ac;
            --accent:#6c8cff; --good:#3fb950; --bad:#f85149; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg);
           color:var(--fg); line-height:1.5; }
    header { padding:16px 24px; border-bottom:1px solid #232733;
             display:flex; justify-content:space-between; align-items:center; }
    header a { color:var(--fg); text-decoration:none; font-weight:700; }
    main { max-width:820px; margin:0 auto; padding:24px; }
    .card { background:var(--card); border:1px solid #232733; border-radius:12px;
            padding:20px; margin-bottom:16px; }
    .muted { color:var(--muted); }
    .btn { display:inline-block; background:var(--accent); color:#fff; border:none;
           border-radius:8px; padding:10px 16px; font-size:15px; cursor:pointer;
           text-decoration:none; }
    .btn.secondary { background:#2a2f3d; }
    .badge { font-size:12px; padding:2px 8px; border-radius:999px; }
    .badge.file { background:#213a5c; color:#9cc2ff; }
    .badge.added { background:#3a2f16; color:#e3b341; }
    .bar { height:8px; background:#2a2f3d; border-radius:999px; overflow:hidden; }
    .bar > span { display:block; height:100%; background:var(--good); }
    input, textarea, select { width:100%; padding:10px; border-radius:8px;
           border:1px solid #2a2f3d; background:#0d0f15; color:var(--fg); }
    label { display:block; margin:12px 0 4px; }
    .streak { font-size:28px; font-weight:800; }
  </style>
</head>
<body>
  <header>
    <a href="/">🔥 Crammer</a>
    <span class="muted">{% block header_extra %}{% endblock %}</span>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
